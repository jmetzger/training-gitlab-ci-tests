stages:
  - test

unit-tests:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt --quiet
    - pytest test_calculator.py -v --junitxml=report.xml --cov=calculator --cov-report=term --cov-report=xml:coverage.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    when: always
    reports:
      junit: report.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
